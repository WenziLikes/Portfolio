    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("theme")
          const theme = savedTheme === "light" ? "light" : "dark"
          const isLight = theme === "light"
          const themeColor = isLight ? "#D9E3EA" : "#14171B"
          const backgroundColor = isLight ? "#D4DDE5" : "#080B10"
          const statusBarStyle = isLight ? "default" : "black-translucent"

          document.documentElement.setAttribute("data-theme", theme)
          document.documentElement.style.colorScheme = theme
          document.documentElement.style.backgroundColor = backgroundColor

          const themeColorMeta = document.querySelector('meta[name="theme-color"]')
          themeColorMeta?.setAttribute("content", themeColor)

          const statusBarMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]')
          statusBarMeta?.setAttribute("content", statusBarStyle)
        } catch {
          // Ignore unavailable storage during initial paint.
        }
      })()
    </script>
